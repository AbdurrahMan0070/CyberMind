<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberMind Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f1117 0%, #1a1f2e 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 32px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 2px solid rgba(77, 217, 224, 0.1);
    }
    
    .logo-section {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #4dd9e0 0%, #3b9fa5 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 800;
      color: #0f1117;
      box-shadow: 0 8px 32px rgba(77, 217, 224, 0.3);
    }
    
    .title-section h1 {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #4dd9e0 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    
    .title-section p {
      color: #94a3b8;
      font-size: 16px;
      font-weight: 500;
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      background: rgba(74, 222, 128, 0.1);
      border: 2px solid rgba(74, 222, 128, 0.3);
      border-radius: 12px;
    }
    
    .status-dot {
      width: 12px;
      height: 12px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
      box-shadow: 0 0 16px #4ade80;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .status-text {
      font-weight: 600;
      color: #4ade80;
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      margin-bottom: 48px;
    }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 28px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--card-color) 0%, transparent 100%);
    }
    
    .stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
    }
    
    .stat-card.total { --card-color: #4dd9e0; }
    .stat-card.clean { --card-color: #4ade80; }
    .stat-card.warnings { --card-color: #fbbf24; }
    .stat-card.threats { --card-color: #f87171; }
    
    .stat-label {
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    
    .stat-value {
      font-size: 48px;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1;
      margin-bottom: 8px;
    }
    
    .stat-card.total .stat-value { color: #4dd9e0; }
    .stat-card.clean .stat-value { color: #4ade80; }
    .stat-card.warnings .stat-value { color: #fbbf24; }
    .stat-card.threats .stat-value { color: #f87171; }
    
    .stat-change {
      font-size: 13px;
      color: #64748b;
      font-weight: 500;
    }
    
    /* Scans Section */
    .scans-section {
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 32px;
    }
    
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    
    .section-title {
      font-size: 24px;
      font-weight: 700;
      color: #e2e8f0;
    }
    
    .refresh-btn {
      padding: 12px 24px;
      background: rgba(77, 217, 224, 0.1);
      border: 2px solid rgba(77, 217, 224, 0.3);
      border-radius: 10px;
      color: #4dd9e0;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .refresh-btn:hover {
      background: rgba(77, 217, 224, 0.2);
      border-color: rgba(77, 217, 224, 0.5);
      transform: translateY(-2px);
    }
    
    .scans-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 600px;
      overflow-y: auto;
      padding-right: 8px;
    }
    
    .scans-list::-webkit-scrollbar {
      width: 8px;
    }
    
    .scans-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
    }
    
    .scans-list::-webkit-scrollbar-thumb {
      background: rgba(77, 217, 224, 0.3);
      border-radius: 4px;
    }
    
    .scans-list::-webkit-scrollbar-thumb:hover {
      background: rgba(77, 217, 224, 0.5);
    }
    
    .scan-item {
      background: rgba(255, 255, 255, 0.02);
      border: 2px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.2s;
    }
    
    .scan-item:hover {
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
    }
    
    .scan-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    
    .scan-domain {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 600;
      color: #4dd9e0;
    }
    
    .severity-badge {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    
    .severity-clean, .severity-low {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.3);
    }
    
    .severity-medium {
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(251, 191, 36, 0.3);
    }
    
    .severity-high, .severity-critical {
      background: rgba(248, 113, 113, 0.15);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.3);
    }
    
    .scan-title {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 12px;
      font-weight: 500;
    }
    
    .scan-summary {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    
    .scan-meta {
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 12px;
      color: #64748b;
    }
    
    .scan-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .empty-state {
      text-align: center;
      padding: 80px 32px;
      color: #64748b;
    }
    
    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 24px;
      opacity: 0.3;
    }
    
    .empty-state-text {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .empty-state-subtext {
      font-size: 14px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-section">
        <div class="logo">C</div>
        <div class="title-section">
          <h1>CyberMind Dashboard</h1>
          <p>Autonomous Cyber Intelligence System</p>
        </div>
      </div>
      <div class="status-indicator">
        <div class="status-dot"></div>
        <span class="status-text">SYSTEM ACTIVE</span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card total">
        <div class="stat-label">Total Scans</div>
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-change">All time</div>
      </div>
      <div class="stat-card clean">
        <div class="stat-label">Clean Sites</div>
        <div class="stat-value" id="stat-clean">0</div>
        <div class="stat-change">No threats detected</div>
      </div>
      <div class="stat-card warnings">
        <div class="stat-label">Warnings</div>
        <div class="stat-value" id="stat-warnings">0</div>
        <div class="stat-change">Medium risk</div>
      </div>
      <div class="stat-card threats">
        <div class="stat-label">Threats</div>
        <div class="stat-value" id="stat-threats">0</div>
        <div class="stat-change">High/Critical risk</div>
      </div>
    </div>

    <div class="scans-section">
      <div class="section-header">
        <h2 class="section-title">Recent Scans</h2>
        <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      </div>
      <div class="scans-list" id="scans-list"></div>
    </div>
  </div>

  <script>
    function loadData() {
      chrome.storage.local.get('scans', function(data) {
        const scans = data.scans || [];
        
        // Update stats
        document.getElementById('stat-total').textContent = scans.length;
        document.getElementById('stat-clean').textContent = scans.filter(s => s.severity === 'clean' || s.severity === 'low').length;
        document.getElementById('stat-warnings').textContent = scans.filter(s => s.severity === 'medium').length;
        document.getElementById('stat-threats').textContent = scans.filter(s => s.severity === 'high' || s.severity === 'critical').length;
        
        const scansList = document.getElementById('scans-list');
        
        if (scans.length === 0) {
          scansList.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">🛡️</div>
              <div class="empty-state-text">No scans yet</div>
              <div class="empty-state-subtext">Visit some websites to see scans here</div>
            </div>
          `;
          return;
        }
        
        scansList.innerHTML = scans.map(scan => {
          const timeAgo = getTimeAgo(scan.timestamp);
          const threatScore = scan.agents?.osint?.threatScore || 0;
          
          return `
            <div class="scan-item">
              <div class="scan-header">
                <div class="scan-domain">${scan.domain}</div>
                <div class="severity-badge severity-${scan.severity}">${scan.severity}</div>
              </div>
              <div class="scan-title">${scan.title}</div>
              <div class="scan-summary">${scan.summary}</div>
              <div class="scan-meta">
                <div class="scan-meta-item">
                  <span>🎯</span>
                  <span>Threat Score: ${threatScore}/100</span>
                </div>
                <div class="scan-meta-item">
                  <span>🕐</span>
                  <span>${timeAgo}</span>
                </div>
                <div class="scan-meta-item">
                  <span>📄</span>
                  <span>${scan.pageType}</span>
                </div>
              </div>
            </div>
          `;
        }).join('');
      });
    }
    
    function getTimeAgo(timestamp) {
      const seconds = Math.floor((Date.now() - timestamp) / 1000);
      
      if (seconds < 60) return 'Just now';
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
      return `${Math.floor(seconds / 86400)}d ago`;
    }
    
    loadData();
    setInterval(loadData, 5000);
  </script>
</body>
</html>
